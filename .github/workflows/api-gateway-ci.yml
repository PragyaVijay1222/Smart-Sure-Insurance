name: CI - ApiGateway

on:
  push:
    paths:
      - 'ApiGatewaySmartSure/**'
      - '.github/workflows/api-gateway-ci.yml'
  pull_request:
    paths:
      - 'ApiGatewaySmartSure/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd ApiGatewaySmartSure
          mvn clean package -DskipTests
