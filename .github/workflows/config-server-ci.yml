name: CI - ConfigServer

on:
  push:
    paths:
      - 'config-server-smart-sure/**'
      - '.github/workflows/config-server-ci.yml'
  pull_request:
    paths:
      - 'config-server-smart-sure/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd config-server-smart-sure
          mvn clean package -DskipTests
