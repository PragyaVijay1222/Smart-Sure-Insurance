name: CI - AdminService

on:
  push:
    paths:
      - 'adminService/**'
      - '.github/workflows/admin-service-ci.yml'
  pull_request:
    paths:
      - 'adminService/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd adminService
          mvn clean package -DskipTests

      - name: Run Tests
        run: |
          cd adminService
          mvn test
